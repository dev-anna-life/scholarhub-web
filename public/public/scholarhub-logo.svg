  <line x1="118" y1="278" x2="218" y2="271" stroke="#008751" stroke-width="2" opacity="0.35"/>
  <line x1="118" y1="294" x2="218" y2="288" stroke="#008751" stroke-width="2" opacity="0.35"/>
  <line x1="118" y1="310" x2="218" y2="305" stroke="#008751" stroke-width="2" opacity="0.35"/>

  <!-- Book lines right page -->
  <line x1="244" y1="254" x2="394" y2="262" stroke="#008751" stroke-width="2" opacity="0.35"/>
  <line x1="244" y1="271" x2="394" y2="278" stroke="#008751" stroke-width="2" opacity="0.35"/>
